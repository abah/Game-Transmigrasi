<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#sky)" stroke="#2E7D32" stroke-width="2"/>
  <!-- Ground -->
  <ellipse cx="32" cy="48" rx="26" ry="10" fill="url(#ground)"/>
  <!-- Tree (left) -->
  <rect x="14" y="30" width="2.5" height="10" rx="0.5" fill="#5D4037"/>
  <circle cx="15.2" cy="26" r="6" fill="#2E7D32"/>
  <circle cx="13" cy="28" r="4.5" fill="#388E3C"/>
  <circle cx="17.5" cy="27.5" r="4" fill="#43A047"/>
  <!-- House (center) -->
  <!-- Walls -->
  <rect x="24" y="33" width="16" height="12" rx="1" fill="#FFCC80"/>
  <rect x="24" y="33" width="16" height="12" rx="1" fill="none" stroke="#E65100" stroke-width="0.5"/>
  <!-- Roof -->
  <polygon points="22,33 32,22 42,33" fill="#D84315"/>
  <polygon points="22,33 32,22 42,33" fill="none" stroke="#BF360C" stroke-width="0.5"/>
  <!-- Roof highlight -->
  <polygon points="23.5,33 32,23.5 32,22 22,33" fill="#E65100" opacity="0.3"/>
  <!-- Door -->
  <rect x="29.5" y="38" width="5" height="7" rx="1" fill="#5D4037"/>
  <circle cx="33" cy="42" r="0.6" fill="#FFC107"/>
  <!-- Window -->
  <rect x="26" y="35" width="3" height="3" rx="0.3" fill="#B3E5FC" stroke="#0277BD" stroke-width="0.4"/>
  <line x1="27.5" y1="35" x2="27.5" y2="38" stroke="#0277BD" stroke-width="0.3"/>
  <line x1="26" y1="36.5" x2="29" y2="36.5" stroke="#0277BD" stroke-width="0.3"/>
  <rect x="35" y="35" width="3" height="3" rx="0.3" fill="#B3E5FC" stroke="#0277BD" stroke-width="0.4"/>
  <line x1="36.5" y1="35" x2="36.5" y2="38" stroke="#0277BD" stroke-width="0.3"/>
  <line x1="35" y1="36.5" x2="38" y2="36.5" stroke="#0277BD" stroke-width="0.3"/>
  <!-- Small tree (right) -->
  <rect x="47" y="34" width="2" height="8" rx="0.5" fill="#5D4037"/>
  <circle cx="48" cy="30" r="5" fill="#388E3C"/>
  <circle cx="46" cy="32" r="3.5" fill="#43A047"/>
  <circle cx="50" cy="31" r="3.5" fill="#2E7D32"/>
  <!-- Small path -->
  <ellipse cx="32" cy="47" rx="4" ry="1.5" fill="#8D6E63" opacity="0.5"/>
</svg>
