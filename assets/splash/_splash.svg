<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7eb8e0" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#7eb8e0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7eb8e0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="houseBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4b169"/>
      <stop offset="100%" stop-color="#b07b3a"/>
    </linearGradient>
  </defs>
  <rect width="2732" height="2732" fill="url(#bg)"/>
  <circle cx="1366" cy="1366" r="1100" fill="url(#glow)"/>

  <!-- Stylized village: 3 simple house silhouettes -->
  <g transform="translate(1366 1100)">
    <!-- Back house -->
    <g transform="translate(-280 -60) scale(0.9)">
      <polygon points="0,0 200,-180 400,0" fill="#c94b4b"/>
      <rect x="40" y="0" width="320" height="200" fill="url(#houseBody)"/>
      <rect x="150" y="80" width="100" height="120" fill="#4a3220"/>
      <rect x="60" y="40" width="60" height="60" fill="#6ec5e8"/>
      <rect x="280" y="40" width="60" height="60" fill="#6ec5e8"/>
    </g>
    <!-- Front house (bigger) -->
    <g transform="translate(-80 0)">
      <polygon points="0,0 250,-230 500,0" fill="#4b8f4b"/>
      <rect x="50" y="0" width="400" height="260" fill="url(#houseBody)"/>
      <rect x="200" y="100" width="100" height="160" fill="#4a3220"/>
      <rect x="80" y="50" width="70" height="70" fill="#8fd9f4"/>
      <rect x="350" y="50" width="70" height="70" fill="#8fd9f4"/>
    </g>
    <!-- Right house -->
    <g transform="translate(430 -30) scale(0.82)">
      <polygon points="0,0 180,-170 360,0" fill="#4a6fa8"/>
      <rect x="30" y="0" width="300" height="210" fill="url(#houseBody)"/>
      <rect x="130" y="70" width="100" height="140" fill="#4a3220"/>
      <rect x="50" y="40" width="55" height="55" fill="#6ec5e8"/>
      <rect x="255" y="40" width="55" height="55" fill="#6ec5e8"/>
    </g>
  </g>

  <text x="1366" y="1680" text-anchor="middle"
        font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif"
        font-size="180" font-weight="700" fill="#7eb8e0">Transmigrasi</text>
  <text x="1366" y="1820" text-anchor="middle"
        font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif"
        font-size="95" font-weight="300" fill="#9ec5db">Membangun Negeri</text>
</svg>
